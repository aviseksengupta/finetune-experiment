# Shakespeare LoRA fine-tuning config.

[data]
source_url = "https://www.gutenberg.org/cache/epub/100/pg100.txt"
raw_text_path = "data/raw/pg100.txt"
chunks_path = "data/processed/shakespeare_chunks.jsonl"
chunk_size = 2048
chunk_overlap = 128
min_chunk_tokens = 128

[model]
name = "meta-llama/Llama-3.2-3B"
max_seq_length = 2048

[lora]
r = 16
lora_alpha = 32
lora_dropout = 0.05
target_modules = ["q_proj", "v_proj"]

[training]
output_dir = "outputs/llama3-shakespeare-lora"
num_train_epochs = 3
per_device_train_batch_size = 4
gradient_accumulation_steps = 4
gradient_checkpointing = false
learning_rate = 2e-4
warmup_ratio = 0.03
lr_scheduler_type = "cosine"
logging_steps = 10
save_steps = 100
fp16 = true
