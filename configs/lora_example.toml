# Example LoRA experiment config
# Run: finetune train --model mistralai/Mistral-7B-v0.1 --dataset tatsu-lab/alpaca --method lora

[training]
model_name_or_path = "mistralai/Mistral-7B-v0.1"
dataset_name = "tatsu-lab/alpaca"
output_dir = "outputs/mistral-7b-alpaca-lora"
num_train_epochs = 3
per_device_train_batch_size = 4
gradient_accumulation_steps = 4
learning_rate = 2e-4
max_seq_length = 2048
run_name = "mistral-7b-alpaca-lora"

[lora]
r = 16
lora_alpha = 32
lora_dropout = 0.05
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]
