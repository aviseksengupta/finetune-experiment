# Example QLoRA experiment config (4-bit quantized, lower VRAM)
# Run: finetune train --model meta-llama/Llama-2-7b-hf --dataset tatsu-lab/alpaca --method qlora

[training]
model_name_or_path = "meta-llama/Llama-2-7b-hf"
dataset_name = "tatsu-lab/alpaca"
output_dir = "outputs/llama2-7b-alpaca-qlora"
num_train_epochs = 3
per_device_train_batch_size = 2
gradient_accumulation_steps = 8
learning_rate = 2e-4
max_seq_length = 2048
bf16 = true
run_name = "llama2-7b-alpaca-qlora"

[qlora]
r = 64
lora_alpha = 16
lora_dropout = 0.1
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]
load_in_4bit = true
bnb_4bit_compute_dtype = "bfloat16"
bnb_4bit_quant_type = "nf4"
bnb_4bit_use_double_quant = true
